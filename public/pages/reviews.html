<!-- Hero Section -->
<section id="reviews-hero" class="hero-section">
    <!-- Using the specific hero section image -->
    <div class="hero-bg" style="background-image: url('assets/images/review hero section.webp');"></div>

    <div class="menu-hero-container container" style="gap: 0;">
        <div class="menu-hero-text">
            <img src="assets/images/japanese reviews.webp" alt="Japanese Reviews" class="menu-hero-jp-img">
            <h1 class="menu-hero-title" data-i18n="reviews.hero.title">Reviews</h1>
        </div>
    </div>
</section>

<!-- Reviews Content Section -->
<section id="reviews-content" class="reviews-section">
    <!-- Decorative Images -->
    <img src="assets/images/reviews puno.png" alt="" class="rev-bg-blossom">
    <img src="assets/images/house.png" alt="" class="rev-bg-house">

    <div class="container reviews-container">

        <!-- Top Row: Summary & Form -->
        <div class="reviews-top-row">

            <!-- Overall Rating Card -->
            <div class="rev-card summary-card">
                <div class="rev-card-title">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                    </svg>
                    Overall Rating
                </div>

                <div class="overall-score-container">
                    <div class="overall-score" id="overall-score">—</div>
                    <div class="overall-stars-info">
                        <div class="stars-display" id="overall-stars">★★★★★</div>
                        <div class="reviews-count" id="reviews-total-count">LOADING...</div>
                    </div>
                </div>

                <div class="rating-bars">
                    <div class="rating-bar-row">
                        <div class="star-label">5 <span>★</span></div>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-5" style="width: 0%;"></div>
                        </div>
                        <div class="bar-percent" id="pct-5">0%</div>
                    </div>
                    <div class="rating-bar-row">
                        <div class="star-label">4 <span>★</span></div>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-4" style="width: 0%;"></div>
                        </div>
                        <div class="bar-percent" id="pct-4">0%</div>
                    </div>
                    <div class="rating-bar-row">
                        <div class="star-label">3 <span>★</span></div>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-3" style="width: 0%;"></div>
                        </div>
                        <div class="bar-percent" id="pct-3">0%</div>
                    </div>
                    <div class="rating-bar-row">
                        <div class="star-label">2 <span>★</span></div>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-2" style="width: 0%;"></div>
                        </div>
                        <div class="bar-percent" id="pct-2">0%</div>
                    </div>
                    <div class="rating-bar-row">
                        <div class="star-label">1 <span>★</span></div>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-1" style="width: 0%;"></div>
                        </div>
                        <div class="bar-percent" id="pct-1">0%</div>
                    </div>
                </div>
            </div>

            <!-- Share Your Experience Card -->
            <div class="rev-card form-card">
                <div class="rev-card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-red">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    Share Your Experience
                </div>

                <form id="reviewSubmitForm" class="review-form-container">
                    <div class="rating-selector">
                        <div class="rating-selector-title" data-i18n="reviews.yourrating">Your Rating</div>
                        <div class="star-rating-input">
                            <input type="radio" id="star5" name="rating" value="5">
                            <label for="star5" title="5 stars">★</label>

                            <input type="radio" id="star4" name="rating" value="4">
                            <label for="star4" title="4 stars">★</label>

                            <input type="radio" id="star3" name="rating" value="3">
                            <label for="star3" title="3 stars">★</label>

                            <input type="radio" id="star2" name="rating" value="2">
                            <label for="star2" title="2 stars">★</label>

                            <input type="radio" id="star1" name="rating" value="1">
                            <label for="star1" title="1 star">★</label>
                        </div>
                    </div>

                    <div class="rev-form-group">
                        <label for="reviewerName" data-i18n="reviews.displayname">Display Name</label>
                        <input type="text" id="reviewerName" name="reviewerName" placeholder="e.g. Yamada Tarō"
                            data-i18n-placeholder="reviews.displayname.placeholder" maxlength="100" required>
                    </div>

                    <div class="rev-form-group">
                        <label for="reviewText" data-i18n="reviews.yourreview">Your Review</label>
                        <textarea id="reviewText" name="reviewText"
                            placeholder="What do you think of the kare-kare? how was the service of our resto?"
                            data-i18n-placeholder="reviews.yourreview.placeholder" maxlength="1000" required></textarea>
                    </div>

                    <div id="review-form-msg" class="rev-form-message"></div>

                    <button type="submit" class="btn-submit-review">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                        Post Feedback
                    </button>
                </form>
            </div>

        </div>

        <!-- Customer Reviews Grid Section -->
        <div class="reviews-list-section">

            <div class="reviews-list-header">
                <h2 class="reviews-list-title" data-i18n="reviews.customer">Customer Reviews</h2>

                <div class="reviews-sort-container">
                    <select id="reviewSort" class="reviews-sort-select">
                        <option value="newest" data-i18n="reviews.sort.newest">Newest First</option>
                        <option value="highest" data-i18n="reviews.sort.highest">Highest Rating</option>
                        <option value="lowest" data-i18n="reviews.sort.lowest">Lowest Rating</option>
                    </select>
                </div>
            </div>

            <div class="reviews-count-text">Showing <span id="displayed-reviews-count">0</span> results</div>

            <div class="reviews-grid" id="reviews-grid-container">
                <!-- Reviews will be loaded dynamically by reviews.js -->
                <div class="reviews-loading" id="reviews-loading">
                    <div class="loader-spinner"></div>
                </div>
            </div>

            <!-- Load More Button -->
            <div class="load-more-container">
                <button id="btnLoadMoreReviews" class="btn-load-more" style="display: none;"
                    data-i18n="reviews.loadmore">もっと見る</button>
                <button id="btnShowLessReviews" class="btn-load-more" style="display: none;"
                    data-i18n="reviews.showless">Show Less</button>
            </div>

        </div>

    </div>
</section>
