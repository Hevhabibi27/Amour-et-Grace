<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Amour et Grace</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="../assets/images/red%20backgound.png" as="image" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin-variables.css" />
  <link rel="stylesheet" href="css/admin-login.css" />
</head>

<body class="login-page">

  <div class="login-wrapper">
    <!-- Decorative Petals -->
    <img src="../assets/images/rose_petals-removebg-preview.png" alt="" class="decorative-petals petals-left"
      aria-hidden="true" loading="lazy" />
    <img src="../assets/images/rose_petals-removebg-preview.png" alt="" class="decorative-petals petals-right"
      aria-hidden="true" loading="lazy" />

    <div class="login-card">
      <div class="login-card__brand">
        <img src="../assets/images/LOGO.jpg" alt="Amour et Grace Logo" class="login-card__logo" width="240" />
        <h1>Admin Dashboard</h1>
      </div>

      <div id="login-error" class="login-form__error" role="alert" aria-live="assertive"></div>

      <form id="login-form" novalidate>
        <div class="login-form__group">
          <svg class="login-form__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
            <rect width="20" height="16" x="2" y="4" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
          <input id="login-email" class="login-form__input" type="email" placeholder="Email" autocomplete="email"
            required autofocus aria-label="Email Address" />
        </div>

        <div class="login-form__group">
          <svg class="login-form__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input id="login-password" class="login-form__input" type="password" placeholder="Password"
            autocomplete="current-password" required aria-label="Password" />
          <button type="button" class="password-toggle" id="toggle-password" aria-label="Show password"
            aria-pressed="false">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              style="display:none;">
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
              <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
              <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
              <line x1="2" x2="22" y1="2" y2="22" />
            </svg>
          </button>
        </div>

        <button id="login-submit" class="login-form__submit" type="submit">
          Sign In
        </button>
      </form>

      <div class="login-footer">
        <svg class="sakura-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 2C13.1 4.5 15.5 6 18.5 6C17 8 18 11.5 21 13.5C18.5 14 16 16.5 16 19.5C14 17.5 11 17.5 8 19.5C8 16.5 5.5 14 3 13.5C6 11.5 7 8 5.5 6C8.5 6 10.9 4.5 12 2Z" />
        </svg>
        料理は芸術、もてなしは心。<br /><span>— 味わい、感じて、愛される —</span>
      </div>
    </div>
  </div>

  <script src="js/admin-utils.js" defer></script>
  <script src="js/admin-login.js" defer></script>
</body>

</html>
